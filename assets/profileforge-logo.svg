<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">ProfileForge Logo</title>
  <desc id="desc">A 3D isometric document and spreadsheet mark with the ProfileForge wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="28" x2="226" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef7ff"/>
      <stop offset="0.48" stop-color="#e8f5ef"/>
      <stop offset="1" stop-color="#f5fbff"/>
    </linearGradient>
    <linearGradient id="blueFace" x1="82" y1="50" x2="178" y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3ba4ff"/>
      <stop offset="1" stop-color="#1f4e78"/>
    </linearGradient>
    <linearGradient id="greenFace" x1="142" y1="58" x2="232" y2="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#55d6a0"/>
      <stop offset="1" stop-color="#16735b"/>
    </linearGradient>
    <linearGradient id="sheetFace" x1="72" y1="42" x2="184" y2="168" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d9e9f7"/>
    </linearGradient>
    <linearGradient id="word" x1="305" y1="71" x2="668" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17202a"/>
      <stop offset="1" stop-color="#1f4e78"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-30%" width="150%" height="170%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#132033" flood-opacity="0.24"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <rect width="980" height="260" rx="48" fill="#f8fbfd"/>
  <g filter="url(#soft)" opacity="0.38">
    <ellipse cx="154" cy="204" rx="104" ry="30" fill="#19344d"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M52 126c0-52 42-94 94-94h12c52 0 94 42 94 94s-42 94-94 94h-12c-52 0-94-42-94-94Z" fill="url(#bg)"/>
    <path d="M96 78 152 52l74 38-58 28-72-40Z" fill="#acd7f5"/>
    <path d="M96 78v88l72 42v-90L96 78Z" fill="url(#blueFace)"/>
    <path d="m168 118 58-28v88l-58 30v-90Z" fill="url(#greenFace)"/>
    <path d="M82 59h78l32 32v74H82V59Z" fill="url(#sheetFace)" stroke="#ffffff" stroke-width="4"/>
    <path d="M160 59v32h32" fill="#c9def0"/>
    <path d="M100 102h60M100 124h72M100 146h48" stroke="#1f4e78" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <path d="M154 124h52v52h-52z" fill="#f2fff9" stroke="#ffffff" stroke-width="5"/>
    <path d="M154 141h52M154 158h52M171 124v52M189 124v52" stroke="#16735b" stroke-width="5" opacity="0.88"/>
    <path d="m80 168 88 50 70-37" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.8"/>
  </g>

  <g>
    <text x="305" y="121" fill="url(#word)" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="0">ProfileForge</text>
    <text x="309" y="165" fill="#5c6876" font-family="Calibri, Segoe UI, Arial, sans-serif" font-size="27" font-weight="400" letter-spacing="0">CV PDF to Excel profile automation</text>
    <path d="M310 190h314" stroke="#2f78ad" stroke-width="8" stroke-linecap="round"/>
    <path d="M644 190h78" stroke="#55d6a0" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
